spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.driver-class-name=org.postgresql.Driver

api.v1.token.secret=secret
api.v1.token.issuer=issuer
api.v1.token.expiration-seconds=1800

api.v1.cors.url=http://localhost:3000
api.v1.cors.methods=GET,POST,PUT,DELETE
api.v1.cors.headers=Authorization,Content-Type

spring.datasource.username=dev
spring.datasource.password=pass

spring.datasource.url=jdbc:postgresql://localhost:5432/scrumdev

spring.jpa.generate-ddl=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true